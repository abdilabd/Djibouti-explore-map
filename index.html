<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte Patrimoine – Djibouti</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --panel: #111111;
    --border: #2a2a2a;
    --gold: #c9a84c;
    --gold-dim: #7a5f25;
    --text: #e8e0d0;
    --text-dim: #7a7060;
    --panel-width: 360px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Text', Georgia, serif;
    height: 100vh; overflow: hidden;
    display: flex; flex-direction: column;
  }

  /* ── LAYOUT ── */
  .main { flex: 1; display: flex; overflow: hidden; }
  #map { flex: 1; background: #050505; min-width: 0; transition: flex .35s cubic-bezier(.4,0,.2,1); }

  /* ── FOND SOMBRE ── */
  .leaflet-container { background: #050505 !important; }
  .leaflet-tile { filter: invert(1) hue-rotate(180deg) brightness(.85) saturate(.7); }
  .leaflet-control-attribution { background: rgba(0,0,0,.7) !important; color: #444 !important; }
  .leaflet-control-attribution a { color: #444 !important; }
  .leaflet-control-zoom a { background: var(--panel) !important; color: var(--text) !important; border-color: var(--border) !important; }
  .leaflet-control-zoom a:hover { background: var(--border) !important; }

  /* ── POPUP ── */
  .leaflet-popup-content-wrapper {
    background: rgba(10,10,10,.96) !important;
    border: 1px solid var(--gold-dim) !important;
    border-radius: 0 !important;
    box-shadow: 0 0 30px rgba(201,168,76,.15) !important;
  }
  .leaflet-popup-tip-container { display: none; }
  .popup-inner { padding: 4px; }
  .popup-type { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
  .popup-name { font-family: 'Cinzel', serif; font-size: 15px; font-weight: 600; color: var(--gold); line-height: 1.3; }
  .popup-region { font-size: 12px; color: var(--text-dim); margin-top: 3px; }
  .popup-action { margin-top: 10px; font-size: 12px; color: var(--text-dim); font-style: italic; }

  /* ── PANNEAU LATÉRAL ── */
  #panel {
    width: 0;
    background: var(--panel);
    border-left: none;
    display: flex; flex-direction: column;
    overflow: hidden;
    transition: width .35s cubic-bezier(.4,0,.2,1);
    position: relative; flex-shrink: 0;
  }
  #panel.open {
    width: var(--panel-width);
    border-left: 1px solid var(--border);
  }

  /* ── ONGLET TOGGLE ── */
  #panel-toggle {
    position: absolute;
    left: -36px; top: 50%; transform: translateY(-50%);
    width: 36px; height: 80px;
    background: var(--panel);
    border: 1px solid var(--border); border-right: none;
    cursor: pointer;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 4px;
    z-index: 10; transition: background .2s;
  }
  #panel:not(.open) { overflow: visible; }
  #panel-toggle:hover { background: #1a1a1a; }
  #panel-toggle .arrow-icon { transition: transform .35s; }
  #panel:not(.open) #panel-toggle .arrow-icon { transform: rotate(180deg); }
  #panel.open #panel-toggle .arrow-icon { transform: rotate(0deg); }
  #panel-toggle .tab-label {
    writing-mode: vertical-rl;
    font-family: 'Cinzel', serif;
    font-size: 8px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text-dim);
    white-space: nowrap;
  }
  #panel.open #panel-toggle .tab-label { display: none; }

  .panel-header { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .panel-title { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 4px; }
  .panel-subtitle { font-size: 13px; color: var(--text-dim); font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .panel-body { flex: 1; overflow-y: auto; padding: 20px; }
  .panel-body::-webkit-scrollbar { width: 4px; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--border); }

  /* État vide */
  .panel-empty {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; text-align: center; gap: 16px;
  }
  .panel-empty svg { opacity: .2; }
  .panel-empty p { color: var(--text-dim); font-style: italic; font-size: 15px; line-height: 1.6; }

  /* Fiche */
  .site-info { display: none; }
  .site-info.visible { display: block; }

  .site-type-badge {
    display: inline-block;
    font-family: 'Cinzel', serif; font-size: 9px;
    letter-spacing: 2px; text-transform: uppercase;
    padding: 3px 10px; border: 1px solid; margin-bottom: 12px;
  }
  .site-name { font-family: 'Cinzel', serif; font-size: 19px; font-weight: 600; color: var(--gold); line-height: 1.3; margin-bottom: 5px; }
  .site-region { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
  .site-coords { font-size: 11px; color: var(--text-dim); font-family: monospace; margin-bottom: 16px; }

  /* ── CARROUSEL ── */
  .photo-carousel {
    width: 100%; aspect-ratio: 16/10;
    position: relative; overflow: hidden;
    background: transparent;
    margin-bottom: 16px;
    border: 1px solid var(--border);
    cursor: zoom-in;
  }
  .photo-carousel.hidden { display: none; }

  .photo-carousel img {
    position: absolute; inset: 0;
    width: 100%; height: 100%; object-fit: cover;
    opacity: 0; transition: opacity .8s ease;
  }
  .photo-carousel img.active { opacity: 1; }

  .photo-counter {
    position: absolute; top: 8px; right: 10px;
    font-family: 'Cinzel', serif; font-size: 10px;
    color: rgba(255,255,255,.7);
    background: rgba(0,0,0,.45);
    padding: 2px 7px;
    z-index: 2; letter-spacing: 1px;
    display: none;
  }

  .photo-dots {
    position: absolute; bottom: 8px; left: 50%;
    transform: translateX(-50%); display: none; gap: 5px; z-index: 2;
  }
  .photo-dots.visible { display: flex; }
  .photo-dot { width: 5px; height: 5px; background: rgba(255,255,255,.25); border-radius: 50%; transition: background .3s; }
  .photo-dot.active { background: var(--gold); }

  .photo-timer { position: absolute; bottom: 0; left: 0; height: 2px; background: var(--gold); z-index: 2; display: none; }
  .photo-timer.visible { display: block; }
  @keyframes timerBar { from { width: 0% } to { width: 100% } }

  .photo-nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 28px; height: 28px; background: rgba(0,0,0,.5);
    border: 1px solid rgba(255,255,255,.15); cursor: pointer;
    display: none; align-items: center; justify-content: center;
    z-index: 3; transition: background .2s;
  }
  .photo-nav:hover { background: rgba(0,0,0,.8); }
  .photo-nav.prev { left: 8px; }
  .photo-nav.next { right: 8px; }
  .photo-nav.visible { display: flex; }

  .site-desc-label { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
  .site-desc { font-size: 15px; line-height: 1.75; color: var(--text); text-align: justify; }

  .site-meta {
    margin-top: 20px; padding-top: 16px;
    border-top: 1px solid var(--border);
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  .meta-item label { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); display: block; margin-bottom: 3px; }
  .meta-item span { font-size: 14px; color: var(--text); }

  /* ── LIGHTBOX ── */
  #lightbox {
    display: none;
    position: fixed; inset: 0; z-index: 9999;
    background: rgba(0,0,0,.92);
    align-items: center; justify-content: center;
    backdrop-filter: blur(6px);
  }
  #lightbox.open { display: flex; }
  #lightbox img { max-width: 90vw; max-height: 88vh; object-fit: contain; border: 1px solid var(--border); box-shadow: 0 0 60px rgba(0,0,0,.8); cursor: default; }
  #lightbox-close { position: absolute; top: 20px; right: 24px; background: none; border: 1px solid var(--border); color: var(--text); cursor: pointer; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: border-color .2s, color .2s; }
  #lightbox-close:hover { border-color: var(--gold); color: var(--gold); }
  #lightbox-counter { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 2px; color: var(--text-dim); }
  .lb-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,.5); border: 1px solid var(--border); color: var(--text); cursor: pointer; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; transition: border-color .2s; font-size: 18px; }
  .lb-nav:hover { border-color: var(--gold); }
  #lb-prev { left: 20px; }
  #lb-next { right: 20px; }
  .lb-nav.hidden { display: none; }

  /* ── BARRE DE STATUT ── */
  .statusbar { z-index: 1000; background: var(--bg); border-top: 1px solid var(--border); height: 32px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .status-count { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; }
  .status-count span { color: var(--gold); }
  .legend { display: flex; gap: 14px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-dim); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
</style>
</head>
<body>

<div class="main">
  <div id="map"></div>

  <div id="panel">
    <button id="panel-toggle" title="Ouvrir / Fermer le panneau">
      <svg class="arrow-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      <span class="tab-label">Fiche</span>
    </button>
    <div class="panel-header">
      <div class="panel-title">Fiche du site</div>
      <div class="panel-subtitle" id="panel-subtitle">Sélectionnez un point</div>
    </div>
    <div class="panel-body">
      <div class="panel-empty" id="panel-empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="1"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/></svg>
        <p>Cliquez sur un point<br>de la carte pour afficher<br>la fiche complète du site.</p>
      </div>
      <div class="site-info" id="site-info">
        <div class="site-type-badge" id="info-badge">—</div>
        <div class="site-name" id="info-name">—</div>
        <div class="site-region" id="info-region"></div>
        <div class="site-coords" id="info-coords"></div>
        <div class="photo-carousel" id="photo-carousel">
          <button class="photo-nav prev" id="photo-prev"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>
          <button class="photo-nav next" id="photo-next"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></button>
          <div class="photo-counter" id="photo-counter"></div>
          <div class="photo-dots" id="photo-dots"></div>
          <div class="photo-timer" id="photo-timer"></div>
        </div>
        <div class="site-desc-label">Description</div>
        <div class="site-desc" id="info-desc">—</div>
        <div class="site-meta" id="info-meta"></div>
      </div>
    </div>
  </div>
</div>

<div id="lightbox">
  <button id="lightbox-close">✕</button>
  <button class="lb-nav" id="lb-prev"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
  <img id="lightbox-img" src="" alt="">
  <button class="lb-nav" id="lb-next"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>
  <div id="lightbox-counter"></div>
</div>

<div class="statusbar">
  <div class="status-count"><span id="count-visible">0</span> sites affichés sur <span id="count-total">0</span></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#e8b84b"></div>Archéologique</div>
    <div class="legend-item"><div class="legend-dot" style="background:#e87a6e"></div>Historique</div>
    <div class="legend-item"><div class="legend-dot" style="background:#7ecb7e"></div>Nature / Réserve</div>
    <div class="legend-item"><div class="legend-dot" style="background:#b07ecb"></div>Religieux</div>
    <div class="legend-item"><div class="legend-dot" style="background:#c9a84c"></div>Mixte</div>
  </div>
  <div class="status-count" id="status-selected">—</div>
</div>

<script>
const TYPE_CONFIG = {
  "archéologique":        { color: "#e8b84b", label: "Archéologique" },
  "historique":           { color: "#e87a6e", label: "Site Historique" },
  "nature":               { color: "#7ecb7e", label: "Site Naturel" },
  "réserve naturelle":    { color: "#7ecb7e", label: "Réserve Naturelle" },
  "religieux":            { color: "#b07ecb", label: "Site Religieux" },
  "naturel / historique": { color: "#c9a84c", label: "Naturel / Historique" },
};
function getTypeCfg(type) {
  if (!type) return { color: "#c9a84c", label: "Site" };
  return TYPE_CONFIG[type.toLowerCase().trim()] || { color: "#c9a84c", label: type };
}

const map = L.map("map", { center: [11.5, 42.8], zoom: 8 });
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { attribution: "© OpenStreetMap contributors", maxZoom: 19 }).addTo(map);

let markers = [], allFeatures = [], searchQuery = "", photoTimer = null, photoIndex = 0, photoList = [], lbIndex = 0;

// ── NOUVELLE FONCTION makeIcon : Miniature circulaire + Bordure ──
function makeIcon(props) {
  const type = props["Type"] || "";
  const photoField = props["Photo"] || "";
  const { color } = getTypeCfg(type);
  
  // On récupère la première photo listée
  const firstPhoto = photoField.split(",")[0].trim();
  const photoUrl = firstPhoto ? "Photo/" + firstPhoto : "";

  // Structure HTML : cercle, bordure, background de secours
  const html = `
    <div style="
      width: 40px; 
      height: 40px; 
      border: 3px solid ${color}; 
      border-radius: 50%; 
      overflow: hidden; 
      background: #333; 
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
    ">
      ${photoUrl 
        ? `<img src="${photoUrl}" style="width:100%; height:100%; object-fit:cover;">` 
        : `<div style="color:${color}; font-size:10px;">?</div>`
      }
    </div>
  `;

  return L.divIcon({
    html: html,
    className: "", // Pas de classe Leaflet standard pour garder notre style
    iconSize: [40, 40],
    iconAnchor: [20, 20], // Centré sur le point de coordonnées
    popupAnchor: [0, -20]
  });
}

// ── Fonctions du Carrousel (inchangées) ──
function updateCarouselUI() {
  const multi = photoList.length > 1;
  document.getElementById("photo-counter").style.display = multi ? "block" : "none";
  if (multi) document.getElementById("photo-counter").textContent = (photoIndex + 1) + " / " + photoList.length;
  document.getElementById("photo-dots").classList.toggle("visible", multi);
  document.getElementById("photo-timer").classList.toggle("visible", multi);
  document.getElementById("photo-prev").classList.toggle("visible", multi);
  document.getElementById("photo-next").classList.toggle("visible", multi);
}

function goToPhoto(idx) {
  const carousel = document.getElementById("photo-carousel");
  const dotsEl = document.getElementById("photo-dots");
  const timerEl = document.getElementById("photo-timer");
  const imgs = carousel.querySelectorAll("img");
  const dots = dotsEl.querySelectorAll(".photo-dot");
  imgs[photoIndex]?.classList.remove("active");
  dots[photoIndex]?.classList.remove("active");
  photoIndex = (idx + photoList.length) % photoList.length;
  imgs[photoIndex]?.classList.add("active");
  dots[photoIndex]?.classList.add("active");
  timerEl.style.animation = "none";
  void timerEl.offsetHeight;
  if (photoList.length > 1) timerEl.style.animation = "timerBar 10s linear";
  updateCarouselUI();
}

function startCarousel(rawPhotoField) {
  const carousel = document.getElementById("photo-carousel");
  const dotsEl = document.getElementById("photo-dots");
  const timerEl = document.getElementById("photo-timer");
  carousel.querySelectorAll("img").forEach(img => img.remove());
  dotsEl.innerHTML = "";
  timerEl.style.animation = "none";
  if (photoTimer) { clearInterval(photoTimer); photoTimer = null; }
  photoIndex = 0;
  photoList = String(rawPhotoField || "").split(",").map(s => s.trim()).filter(Boolean).map(f => "Photo/" + f);
  if (photoList.length === 0) { carousel.classList.add("hidden"); return; }
  carousel.classList.remove("hidden");
  photoList.forEach((src, i) => {
    const img = document.createElement("img");
    img.src = src;
    img.className = i === 0 ? "active" : "";
    img.addEventListener("click", () => openLightbox(i));
    carousel.insertBefore(img, dotsEl);
    if (photoList.length > 1) {
      const dot = document.createElement("div");
      dot.className = "photo-dot" + (i === 0 ? " active" : "");
      dotsEl.appendChild(dot);
    }
  });
  updateCarouselUI();
  if (photoList.length > 1) {
    timerEl.style.animation = "timerBar 10s linear";
    photoTimer = setInterval(() => goToPhoto(photoIndex + 1), 10000);
  }
}

document.getElementById("photo-prev").addEventListener("click", e => { e.stopPropagation(); if (photoTimer) clearInterval(photoTimer); goToPhoto(photoIndex - 1); if (photoList.length > 1) photoTimer = setInterval(() => goToPhoto(photoIndex + 1), 10000); });
document.getElementById("photo-next").addEventListener("click", e => { e.stopPropagation(); if (photoTimer) clearInterval(photoTimer); goToPhoto(photoIndex + 1); if (photoList.length > 1) photoTimer = setInterval(() => goToPhoto(photoIndex + 1), 10000); });

// ── Lightbox (inchangée) ──
function openLightbox(idx) {
  lbIndex = idx;
  const lb = document.getElementById("lightbox");
  document.getElementById("lightbox-img").src = photoList[lbIndex];
  lb.classList.add("open");
  const multi = photoList.length > 1;
  document.getElementById("lightbox-counter").textContent = multi ? (lbIndex + 1) + " / " + photoList.length : "";
  document.getElementById("lb-prev").classList.toggle("hidden", !multi);
  document.getElementById("lb-next").classList.toggle("hidden", !multi);
}
function lbGo(dir) { lbIndex = (lbIndex + dir + photoList.length) % photoList.length; document.getElementById("lightbox-img").src = photoList[lbIndex]; document.getElementById("lightbox-counter").textContent = photoList.length > 1 ? (lbIndex + 1) + " / " + photoList.length : ""; }
document.getElementById("lightbox-close").addEventListener("click", () => document.getElementById("lightbox").classList.remove("open"));
document.getElementById("lb-prev").addEventListener("click", e => { e.stopPropagation(); lbGo(-1); });
document.getElementById("lb-next").addEventListener("click", e => { e.stopPropagation(); lbGo(1); });

// ── Panneau (inchangé) ──
const panel = document.getElementById("panel");
document.getElementById("panel-toggle").addEventListener("click", () => { panel.classList.toggle("open"); setTimeout(() => map.invalidateSize(), 360); });

function showSiteInfo(props, latlng) {
  const cfg = getTypeCfg(props["Type"]);
  document.getElementById("panel-empty").style.display = "none";
  document.getElementById("site-info").classList.add("visible");
  const badge = document.getElementById("info-badge");
  badge.textContent = cfg.label; badge.style.color = cfg.color; badge.style.borderColor = cfg.color;
  document.getElementById("info-name").textContent = props["Nom du site"] || "Sans nom";
  document.getElementById("info-region").textContent = props["Region"] ? "📍 " + props["Region"] : "";
  document.getElementById("info-coords").textContent = latlng.lat.toFixed(5) + "°N  " + latlng.lng.toFixed(5) + "°E";
  document.getElementById("info-desc").textContent = props["Description"] || "Aucune description.";
  document.getElementById("panel-subtitle").textContent = props["Nom du site"];
  document.getElementById("status-selected").textContent = "⬤ " + (props["Nom du site"] || "");
  document.getElementById("info-meta").innerHTML = `<div class="meta-item"><label>Région</label><span>${props["Region"] || "—"}</span></div><div class="meta-item"><label>Type</label><span>${cfg.label}</span></div>`;
  startCarousel(props["Photo"]);
  panel.classList.add("open"); setTimeout(() => map.invalidateSize(), 360);
}

// ── Marqueurs : Adaptation pour makeIcon(p) ──
function renderMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  const query = searchQuery.toLowerCase();
  allFeatures.forEach(f => {
    const p = f.properties;
    if (query && !(p["Nom du site"] || "").toLowerCase().includes(query)) return;
    const latlng = L.latLng(f.geometry.coordinates[1], f.geometry.coordinates[0]);
    // NOUVEAU : On passe l'objet complet 'p' à makeIcon
    const marker = L.marker(latlng, { icon: makeIcon(p) });
    marker.bindPopup(`<div class="popup-inner"><div class="popup-type" style="color:${getTypeCfg(p["Type"]).color}">${getTypeCfg(p["Type"]).label}</div><div class="popup-name">${p["Nom du site"]}</div><div class="popup-region">${p["Region"] || ""}</div><div class="popup-action">↳ Voir la fiche →</div></div>`, { maxWidth: 250 });
    marker.on("click", () => showSiteInfo(p, latlng));
    marker.addTo(map);
    markers.push(marker);
  });
  document.getElementById("count-visible").textContent = markers.length;
  document.getElementById("count-total").textContent = allFeatures.length;
}

map.on("click", (e) => { if (e.originalEvent.target.id === "map") { panel.classList.remove("open"); setTimeout(() => map.invalidateSize(), 360); } });

// ── Chargement (inchangé) ──
